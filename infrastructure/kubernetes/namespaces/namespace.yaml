apiVersion: v1
kind: Namespace
metadata:
  name: supply-chain
  labels:
    name: supply-chain
    environment: production
  annotations:
    contact: platform-team@supply-chain.internal
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: supply-chain-quota
  namespace: supply-chain
spec:
  hard:
    requests.cpu: "100"
    requests.memory: 200Gi
    limits.cpu: "200"
    limits.memory: 400Gi
    pods: "200"
    services: "50"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: supply-chain-limits
  namespace: supply-chain
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "8"
        memory: "16Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
