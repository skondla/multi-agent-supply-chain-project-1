apiVersion: v1
kind: ConfigMap
metadata:
  name: supply-chain-config
  namespace: supply-chain
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  APP_VERSION: "1.0.0"

  # Database
  DB_HOST: "supply-chain-production.cluster-xxxx.us-east-1.rds.amazonaws.com"
  DB_PORT: "5432"
  DB_NAME: "supply_chain_db"
  DB_POOL_SIZE: "20"
  DB_MAX_OVERFLOW: "10"

  # Redis
  REDIS_HOST: "supply-chain-production.xxxx.0001.use1.cache.amazonaws.com"
  REDIS_PORT: "6379"
  REDIS_DB: "0"

  # Kafka
  KAFKA_BOOTSTRAP_SERVERS: "b-1.supply-chain.kafka.us-east-1.amazonaws.com:9096,b-2.supply-chain.kafka.us-east-1.amazonaws.com:9096"
  KAFKA_SECURITY_PROTOCOL: "SASL_SSL"
  KAFKA_SASL_MECHANISM: "AWS_MSK_IAM"

  # MLflow
  MLFLOW_TRACKING_URI: "http://mlflow.supply-chain.svc.cluster.local:5000"

  # Observability
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger-collector.monitoring.svc.cluster.local:4317"
  OTEL_SERVICE_NAME: "supply-chain-api"

  # CORS
  CORS_ORIGINS: "https://app.supply-chain.internal,https://admin.supply-chain.internal"
