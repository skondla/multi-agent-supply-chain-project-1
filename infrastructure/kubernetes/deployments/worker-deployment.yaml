apiVersion: apps/v1
kind: Deployment
metadata:
  name: supply-chain-worker
  namespace: supply-chain
  labels:
    app: supply-chain-worker
    component: worker
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9808"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: supply-chain-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: supply-chain-worker
        component: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9808"
    spec:
      serviceAccountName: supply-chain-worker
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 120
      containers:
        - name: worker
          image: 123456789.dkr.ecr.us-east-1.amazonaws.com/supply-chain/supply-chain-api:latest
          command:
            - celery
            - -A
            - app.tasks.celery_app
            - worker
            - --loglevel=info
            - --concurrency=4
            - -Q
            - default,orders,inventory,ml,alerts
          envFrom:
            - configMapRef:
                name: supply-chain-config
            - secretRef:
                name: supply-chain-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            exec:
              command: ["celery", "-A", "app.tasks.celery_app", "inspect", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 15
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
