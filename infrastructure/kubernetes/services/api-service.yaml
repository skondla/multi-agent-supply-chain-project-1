apiVersion: v1
kind: Service
metadata:
  name: supply-chain-api
  namespace: supply-chain
  labels:
    app: supply-chain-api
spec:
  type: ClusterIP
  selector:
    app: supply-chain-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
    - name: metrics
      protocol: TCP
      port: 9090
      targetPort: 8000
