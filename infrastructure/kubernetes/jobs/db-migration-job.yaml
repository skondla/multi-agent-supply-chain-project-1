apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration
  namespace: supply-chain
  labels:
    app: db-migration
    component: migration
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: db-migration
    spec:
      restartPolicy: OnFailure
      serviceAccountName: supply-chain-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: migration
          image: 123456789.dkr.ecr.us-east-1.amazonaws.com/supply-chain/supply-chain-api:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: supply-chain-config
            - secretRef:
                name: supply-chain-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
