name: CI Pipeline

on:
  push:
    branches: [main, develop, 'release/**', 'feature/**']
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_NAME: supply-chain-api

jobs:
  # ── Code Quality ──────────────────────────────────────────────────────────────
  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Slack Notify Start
        uses: 8398a7/action-slack@v3
        if: github.ref == 'refs/heads/main'
        with:
          status: custom
          custom_payload: |
            {"text": "🔍 CI pipeline starting for `${{ github.ref_name }}` by @${{ github.actor }}"}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install ruff black mypy

      - name: Run Ruff linter
        run: ruff check . --output-format=github

      - name: Run Black formatter check
        run: black --check --diff .

      - name: Run MyPy type check
        run: mypy app/ agents/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

      - name: Slack Notify Failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: "❌ Code quality check failed on `${{ github.ref_name }}`"
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ── Unit Tests ────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Slack Notify Tests Starting
        uses: 8398a7/action-slack@v3
        if: github.ref == 'refs/heads/main'
        with:
          status: custom
          custom_payload: |
            {"text": "🧪 Running unit tests for `${{ github.ref_name }}`"}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          pip install aiosqlite  # For SQLite test backend

      - name: Run unit tests with coverage
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
          ANTHROPIC_API_KEY: sk-ant-test-key-placeholder
          JWT_SECRET_KEY: test-jwt-secret-key-min-32-chars-long
          APP_SECRET_KEY: test-app-secret-key-min-32-chars-long
          APP_ENV: testing
        run: |
          pytest tests/unit/ -v \
            --cov=app \
            --cov=agents \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=70 \
            --junitxml=junit/unit-test-results.xml \
            -p no:warnings

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unit-tests
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: junit/**/*.xml

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/

      - name: Slack Notify Unit Tests Result
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "Unit tests ${{ job.status }} for `${{ github.ref_name }}`"
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ── Integration Tests ─────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: supply_chain_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/supply_chain_test
          REDIS_URL: redis://localhost:6379/0
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST }}
          JWT_SECRET_KEY: test-integration-jwt-secret-key-32chars
          APP_SECRET_KEY: test-integration-app-secret-key-32chars
          APP_ENV: testing
        run: |
          pytest tests/integration/ -v \
            --junitxml=junit/integration-test-results.xml \
            --timeout=60 \
            -p no:warnings || true  # Don't fail CI on integration tests for now

      - name: Slack Notify Integration Tests
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "Integration tests ${{ job.status }} for `${{ github.ref_name }}`"
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ── CI Summary ────────────────────────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, integration-tests]
    if: always()
    steps:
      - name: Check CI results
        run: |
          if [[ "${{ needs.code-quality.result }}" == "failure" ]] || \
             [[ "${{ needs.unit-tests.result }}" == "failure" ]]; then
            echo "CI FAILED"
            exit 1
          fi
          echo "CI PASSED"

      - name: Slack CI Complete
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
          text: "CI pipeline complete for `${{ github.ref_name }}`"
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
