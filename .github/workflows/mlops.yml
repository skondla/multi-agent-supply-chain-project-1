name: MLOps Pipeline

on:
  schedule:
    - cron: '0 4 * * 0'  # Weekly on Sunday at 4 AM UTC
  workflow_dispatch:
    inputs:
      force_retrain:
        description: Force model retraining
        required: false
        default: 'false'
        type: boolean
      model_type:
        description: Which model to retrain
        required: false
        default: all
        type: choice
        options: [all, demand_forecast, anomaly_detection]

jobs:
  data-validation:
    name: Data Quality Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Slack Notify MLOps Start
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {"text": "🤖 MLOps pipeline starting - weekly model evaluation & retraining"}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ML dependencies
        run: pip install -r requirements.txt

      - name: Validate training data
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: python ml/scripts/validate_data.py
        continue-on-error: true

      - name: Slack Notify Data Validation
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "Data validation ${{ job.status }} for MLOps pipeline"
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

  train-demand-forecast:
    name: Train Demand Forecast Model
    runs-on: ubuntu-latest
    needs: data-validation
    if: ${{ github.event.inputs.model_type == 'all' || github.event.inputs.model_type == 'demand_forecast' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train demand forecasting model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python ml/demand_forecast/train.py
        continue-on-error: true

      - name: Evaluate model performance
        run: python ml/scripts/evaluate_models.py --model demand_forecast
        continue-on-error: true

      - name: Slack Notify Training
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "Demand forecast model training ${{ job.status }}"
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

  train-anomaly-detection:
    name: Train Anomaly Detection Model
    runs-on: ubuntu-latest
    needs: data-validation
    if: ${{ github.event.inputs.model_type == 'all' || github.event.inputs.model_type == 'anomaly_detection' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train anomaly detection model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python ml/anomaly_detection/train.py
        continue-on-error: true

      - name: Slack Notify Anomaly Training
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "Anomaly detection model training ${{ job.status }}"
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

  register-models:
    name: Register & Deploy Models
    runs-on: ubuntu-latest
    needs: [train-demand-forecast, train-anomaly-detection]
    if: always()
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Register models in MLflow
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python ml/scripts/register_model.py
        continue-on-error: true

      - name: MLOps Pipeline Complete Notification
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              "blocks": [
                {"type": "header", "text": {"type": "plain_text", "text": "🤖 MLOps Pipeline Complete"}},
                {"type": "section", "fields": [
                  {"type": "mrkdwn", "text": "*Demand Forecast:*\n${{ needs.train-demand-forecast.result }}"},
                  {"type": "mrkdwn", "text": "*Anomaly Detection:*\n${{ needs.train-anomaly-detection.result }}"},
                  {"type": "mrkdwn", "text": "*MLflow:*\n${{ secrets.MLFLOW_TRACKING_URI }}"}
                ]}
              ]
            }
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
