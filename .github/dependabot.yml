version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    labels:
      - dependencies
      - security
    open-pull-requests-limit: 10
    groups:
      production-dependencies:
        patterns: ["*"]
        exclude-patterns: ["pytest*", "ruff*", "black*", "mypy*", "locust*"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci-cd

  - package-ecosystem: terraform
    directory: /infrastructure/terraform
    schedule:
      interval: weekly
    labels:
      - dependencies
      - terraform
